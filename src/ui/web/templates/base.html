<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Cyber Controller{% endblock %}</title>
    <meta name="csrf-token" content="{{ csrf_token }}">
    <!-- PWA: installable LAN wireless remote (MB cluster). Icons are owner-supplied (see static/icons/README.md). -->
    <link rel="manifest" href="/manifest.webmanifest">
    <meta name="theme-color" content="#a371f7">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Cyber Controller">
    <link rel="apple-touch-icon" href="/static/icons/ace-192.png">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <!-- Socket.IO client is VENDORED and served same-origin (see static/vendor/README.md): no external
         CDN dependency, works offline, and no supply-chain surface from a compromised content network. -->
    <script nonce="{{ csp_nonce }}" src="{{ url_for('static', filename='vendor/socket.io.min.js') }}"></script>
    <script nonce="{{ csp_nonce }}">window.CSRF_TOKEN = {{ csrf_token|tojson }};</script>
    <script nonce="{{ csp_nonce }}">
        // Register the PWA service worker. Only fires in a secure context (TLS or localhost); on a bare
        // LAN IP without TLS the browser silently declines — expected, see docs/MOBILE-REMOTE.md.
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', function () {
                navigator.serviceWorker.register('/sw.js').catch(function () { /* non-secure context */ });
            });
        }
    </script>
</head>
<body>
    <nav class="navbar">
        <div class="nav-brand">
            <span class="brand-icon">&#x25C8;</span>
            <span class="brand-text">Cyber Controller</span>
        </div>
        <button class="nav-toggle" id="nav-toggle" aria-label="Toggle navigation">
            &#9776;
        </button>
        <div class="nav-links">
            <a href="/" class="nav-link {% if active == 'dashboard' %}active{% endif %}">Dashboard</a>
            <a href="/devices" class="nav-link {% if active == 'devices' %}active{% endif %}">Devices</a>
            <a href="/flash" class="nav-link {% if active == 'flash' %}active{% endif %}">Flash</a>
            <a href="/targets" class="nav-link {% if active == 'targets' %}active{% endif %}">Targets</a>
            <a href="/nodes" class="nav-link {% if active == 'nodes' %}active{% endif %}">Nodes</a>
            <a href="/remote" class="nav-link {% if active == 'remote' %}active{% endif %}">Remote</a>
        </div>
    </nav>

    <main class="container">
        {% block content %}{% endblock %}
    </main>

    <footer class="footer">
        <span>Cyber Controller &mdash; LxveAce 2026</span>
    </footer>

    <script nonce="{{ csp_nonce }}">
        // Nav toggle (moved off an inline onclick= so the strict nonce CSP can drop 'unsafe-inline').
        document.getElementById('nav-toggle').addEventListener('click', function () {
            document.querySelector('.nav-links').classList.toggle('open');
        });

        // Authenticate the socket handshake with the per-session CSRF/connection token.
        const socket = io({ auth: { csrf: window.CSRF_TOKEN } });

        socket.on('connect', function() {
            console.log('WebSocket connected');
        });

        socket.on('connect_error', function(err) {
            console.warn('WebSocket rejected:', err && err.message);
        });

        socket.on('device_connected', function(data) {
            console.log('Device connected:', data);
            if (typeof onDeviceConnected === 'function') onDeviceConnected(data);
        });

        socket.on('device_disconnected', function(data) {
            console.log('Device disconnected:', data);
            if (typeof onDeviceDisconnected === 'function') onDeviceDisconnected(data);
        });

        socket.on('target_discovered', function(data) {
            console.log('Target discovered:', data);
            if (typeof onTargetDiscovered === 'function') onTargetDiscovered(data);
        });

        socket.on('flash_progress', function(data) {
            console.log('Flash progress:', data);
            if (typeof onFlashProgress === 'function') onFlashProgress(data);
        });

        socket.on('serial_output', function(data) {
            if (typeof onSerialOutput === 'function') onSerialOutput(data);
        });
    </script>

    {% block scripts %}{% endblock %}
</body>
</html>
