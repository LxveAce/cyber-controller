name: Update OS catalog

# Keep the bundled Software-OS catalog (Kali / Tails / Arch versions + checksums) current
# automatically: weekly (and on demand), resolve the latest upstream versions and open a PR
# with the refreshed src/config/os_catalog.json. The app still works offline from whatever is
# bundled; this just keeps the pinned fallback fresh.

on:
  schedule:
    - cron: "0 6 * * 1"   # Mondays 06:00 UTC
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install requests
      - name: Refresh pinned OS versions
        run: python scripts/update_os_catalog.py
      # Push any refresh to a branch (a human opens the PR to merge). The previous version used
      # peter-evans/create-pull-request, which fails when "Allow GitHub Actions to create and approve
      # pull requests" is off at the repo level. GITHUB_TOKEN's contents:write can still push a branch,
      # so this keeps the job green without depending on that setting.
      - name: Push the refresh to a branch (if the catalog changed)
        run: |
          if git diff --quiet -- src/config/os_catalog.json; then
            echo "OS catalog already current — nothing to refresh."
            exit 0
          fi
          git config user.name "LxveAce"
          git config user.email "251227901+LxveAce@users.noreply.github.com"
          git checkout -B auto/os-catalog-refresh
          git add src/config/os_catalog.json
          git commit -m "chore(os-catalog): refresh pinned OS versions"
          git push -f origin auto/os-catalog-refresh
          echo "::notice::Refreshed OS catalog pushed to branch auto/os-catalog-refresh — open a PR to merge it."
