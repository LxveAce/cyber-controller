name: Build & Release

on:
  release:
    types: [published]
  # Manual re-run for the best-effort Linux-ARM binary against an existing release (the other
  # platforms only build on a real release event — see the `if:` guards below).
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing release tag to attach the ARM binary to (e.g. v1.3.0)"
        required: true
        default: "v1.3.0"

permissions:
  contents: write

# Build via build.py (the single source of truth) on every platform so the release binaries
# bundle EVERYTHING the app needs at runtime — the QSS theme, assets, all UI submodules, and
# the firmware profiles. The previous hand-rolled per-job pyinstaller command bundled only
# src/config/profiles and never the QSS, so the shipped GUI crashed silently at launch
# (apply_theme() read a stylesheet that was not in the bundle). build.py keeps CI and local
# builds identical. `submodules: recursive` ensures the deadmans-switch submodule is present.

jobs:
  build-windows:
    runs-on: windows-latest
    if: github.event_name == 'release'
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller
          pip install .
      - name: Build executable
        run: python build.py
      - name: Rename binary
        shell: cmd
        run: |
          move dist\CyberController.exe dist\cyber-controller-${{ github.event.release.tag_name }}-windows-x64.exe
      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          files: dist/cyber-controller-${{ github.event.release.tag_name }}-windows-x64.exe

  build-linux:
    runs-on: ubuntu-latest
    if: github.event_name == 'release'
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y libegl1 libxkbcommon0
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller
          pip install .
      - name: Build executable
        run: python build.py
      - name: Rename binary
        run: |
          mv dist/CyberController dist/cyber-controller-${{ github.event.release.tag_name }}-linux-x64
          chmod +x dist/cyber-controller-${{ github.event.release.tag_name }}-linux-x64
      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          files: dist/cyber-controller-${{ github.event.release.tag_name }}-linux-x64

  build-linux-arm:
    runs-on: ubuntu-latest
    # ARM/QEMU build is best-effort (slow) — never fail the release on it. Runs on a real release AND
    # via workflow_dispatch (to attach the ARM binary to an existing release after a fix).
    continue-on-error: true
    env:
      TAG: ${{ github.event.release.tag_name || inputs.tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64
      - name: Build with QEMU
        # Use Debian trixie (Python 3.13, satisfies requires-python>=3.12) and its PREBUILT arm64
        # PyQt5 + cryptography from apt — so PyQt5 is never source-built (the old failure: no aarch64
        # wheel -> sip/qmake build with no qmake). pip only installs pyinstaller + the app itself
        # (--no-deps), so no heavy native build runs under emulation.
        run: |
          docker run --rm --platform linux/arm64 \
            -v ${{ github.workspace }}:/workspace \
            -w /workspace \
            debian:trixie-slim bash -c "
              set -e
              export DEBIAN_FRONTEND=noninteractive
              apt-get update
              apt-get install -y --no-install-recommends \
                python3 python3-pip python3-dev binutils \
                python3-pyqt5 python3-pyqt5.qtsvg \
                python3-serial python3-requests python3-psutil python3-cryptography \
                libegl1 libxkbcommon0
              pip3 install --break-system-packages pyinstaller
              pip3 install --break-system-packages --no-deps .
              python3 build.py
              mv dist/CyberController dist/cyber-controller-${TAG}-linux-arm64
              chmod +x dist/cyber-controller-${TAG}-linux-arm64
            "
      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.TAG }}
          files: dist/cyber-controller-${{ env.TAG }}-linux-arm64

  build-macos:
    runs-on: macos-latest
    if: github.event_name == 'release'
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller
          pip install .
      - name: Build executable
        run: python build.py
      - name: Rename binary
        run: |
          mv dist/CyberController dist/cyber-controller-${{ github.event.release.tag_name }}-macos-arm64
          chmod +x dist/cyber-controller-${{ github.event.release.tag_name }}-macos-arm64
      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          files: dist/cyber-controller-${{ github.event.release.tag_name }}-macos-arm64
