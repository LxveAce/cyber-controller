name: Build & Release

on:
  release:
    types: [published]
  # Manual re-run for the best-effort Linux-ARM binary against an existing release (the other
  # platforms only build on a real release event — see the `if:` guards below).
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing release tag to attach the ARM binary to (e.g. v1.3.0)"
        required: true
        default: "v1.3.0"

permissions:
  contents: write

# Build via build.py (the single source of truth) on every platform so the release binaries
# bundle EVERYTHING the app needs at runtime — the QSS theme, assets, all UI submodules, and
# the firmware profiles. The previous hand-rolled per-job pyinstaller command bundled only
# src/config/profiles and never the QSS, so the shipped GUI crashed silently at launch
# (apply_theme() read a stylesheet that was not in the bundle). build.py keeps CI and local
# builds identical. `submodules: recursive` ensures the deadmans-switch submodule is present.

jobs:
  build-windows:
    runs-on: windows-latest
    # Runs on a real release AND via workflow_dispatch (to re-attach the core exe + installer to an
    # existing release tag after a fix — no tag/release surgery needed).
    env:
      TAG: ${{ github.event.release.tag_name || inputs.tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller
          pip install .
      - name: Build executable (onefile)
        run: python build.py
      - name: Rename binary
        shell: cmd
        run: |
          move dist\CyberController.exe dist\cyber-controller-${{ env.TAG }}-windows-x64.exe
      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.TAG }}
          files: |
            dist/cyber-controller-${{ env.TAG }}-windows-x64.exe
      # ── Installer (registers in Settings > Apps > Installed apps). Best-effort: never block the
      # ── core binary release on an installer hiccup. NOTE: unsigned — SmartScreen still applies
      # ── until a code-signing cert is added (see docs/WINDOWS-SECURITY.md).
      - name: Build folder build (for installer)
        continue-on-error: true
        run: python build.py --onedir
      - name: Install Inno Setup
        continue-on-error: true
        run: choco install innosetup --no-progress -y
      - name: Build installer
        continue-on-error: true
        shell: pwsh
        run: |
          $ver = "${{ env.TAG }}".TrimStart('v')
          # NOTE: ${Env:ProgramFiles(x86)} MUST be brace-wrapped — the '(x86)' in the var name otherwise
          # parses as a call and yields the space-less 'C:\Program Files(x86)\...' path (which does not
          # exist), so ISCC was never found and the installer silently never built (continue-on-error
          # masked it — the installer never shipped in any release before this fix).
          & "${Env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe" "/DMyAppVersion=$ver" "installer\cyber-controller.iss"
      - name: Upload installer asset
        continue-on-error: true
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.TAG }}
          files: |
            installer/Output/*.exe

  build-linux:
    runs-on: ubuntu-latest
    # Runs on a real release AND via workflow_dispatch, so linux-x64 can be (re)attached to an existing
    # release tag after a fix — mirrors the Windows/macOS/ARM jobs, so a manual rebuild covers EVERY
    # platform (it previously skipped dispatch, leaving a stale linux-x64 behind on any manual refresh).
    env:
      TAG: ${{ github.event.release.tag_name || inputs.tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y libegl1 libxkbcommon0
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller
          pip install .
      - name: Build executable
        run: python build.py
      - name: Rename binary
        run: |
          mv dist/CyberController dist/cyber-controller-${{ env.TAG }}-linux-x64
          chmod +x dist/cyber-controller-${{ env.TAG }}-linux-x64
      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.TAG }}
          files: |
            dist/cyber-controller-${{ env.TAG }}-linux-x64

  build-linux-arm:
    runs-on: ubuntu-latest
    # ARM/QEMU build is best-effort (slow) — never fail the release on it. Runs on a real release AND
    # via workflow_dispatch (to attach the ARM binary to an existing release after a fix).
    continue-on-error: true
    env:
      TAG: ${{ github.event.release.tag_name || inputs.tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64
      - name: Build with QEMU
        # Use Debian trixie (Python 3.13, satisfies requires-python>=3.12) and its PREBUILT arm64
        # PyQt5 + cryptography from apt — so PyQt5 is never source-built (the old failure: no aarch64
        # wheel -> sip/qmake build with no qmake). pip only installs pyinstaller + the app itself
        # (--no-deps), so no heavy native build runs under emulation.
        run: |
          docker run --rm --platform linux/arm64 \
            -v ${{ github.workspace }}:/workspace \
            -w /workspace \
            debian:trixie-slim bash -c "
              set -e
              export DEBIAN_FRONTEND=noninteractive
              apt-get update
              apt-get install -y --no-install-recommends \
                python3 python3-pip python3-dev python3-tk binutils \
                python3-pyqt5 python3-pyqt5.qtsvg \
                python3-serial python3-requests python3-psutil python3-cryptography \
                libegl1 libxkbcommon0
              pip3 install --break-system-packages pyinstaller
              pip3 install --break-system-packages --no-deps .
              python3 build.py
              mv dist/CyberController dist/cyber-controller-${TAG}-linux-arm64
              chmod +x dist/cyber-controller-${TAG}-linux-arm64
            "
      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.TAG }}
          files: dist/cyber-controller-${{ env.TAG }}-linux-arm64

  build-macos:
    runs-on: macos-latest
    # Best-effort (like the ARM job): a macOS-specific build hiccup (e.g. the .ico->.icns icon
    # conversion) must NEVER fail the whole release. Runs on a real release AND via workflow_dispatch,
    # so macOS can be (re)attached to an existing release tag after a fix — no tag/release surgery needed.
    continue-on-error: true
    env:
      TAG: ${{ github.event.release.tag_name || inputs.tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        # Pillow is REQUIRED on macOS: PyInstaller converts the app icon.ico -> .icns via Pillow, and
        # the macos-latest runner image no longer ships it preinstalled (v1.4.0 built when it did).
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller pillow
          pip install .
      - name: Build executable
        run: python build.py
      - name: Rename binary
        run: |
          mv dist/CyberController dist/cyber-controller-${TAG}-macos-arm64
          chmod +x dist/cyber-controller-${TAG}-macos-arm64
      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.TAG }}
          files: |
            dist/cyber-controller-${{ env.TAG }}-macos-arm64

  # ── Consolidate every attached binary into ONE SHA256SUMS.txt (de-bulked layout — no per-file *.sha256). ──
  checksums:
    runs-on: ubuntu-latest
    needs: [build-windows, build-linux, build-linux-arm, build-macos]
    if: always()
    env:
      TAG: ${{ github.event.release.tag_name || inputs.tag }}
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: Build consolidated SHA256SUMS.txt
        run: |
          mkdir dl && cd dl
          gh release download "$TAG" --repo "$GITHUB_REPOSITORY" --pattern 'cyber-controller-*' --clobber
          rm -f *.sha256
          sha256sum cyber-controller-* | sed 's/ \*/  /' > ../SHA256SUMS.txt
          cat ../SHA256SUMS.txt
      - name: Upload SHA256SUMS.txt
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.TAG }}
          files: SHA256SUMS.txt

  # ── VirusTotal on EVERY release, results posted in the notes. Needs the VT_API_KEY repo secret; skips
  # ── gracefully (no-op) if it's absent so a missing secret never fails a release. ──
  virustotal:
    runs-on: ubuntu-latest
    needs: [checksums]
    if: always()
    env:
      TAG: ${{ github.event.release.tag_name || inputs.tag }}
      GH_TOKEN: ${{ github.token }}
      VT_API_KEY: ${{ secrets.VT_API_KEY }}
    steps:
      - uses: actions/checkout@v4
      - name: Gate on the VT secret
        id: gate
        run: |
          if [ -z "$VT_API_KEY" ]; then
            echo "run=false" >> "$GITHUB_OUTPUT"
            echo "::notice::VT_API_KEY secret not set — skipping VirusTotal (add it in Settings → Secrets to enable)."
          else
            echo "run=true" >> "$GITHUB_OUTPUT"
          fi
      - uses: actions/setup-python@v5
        if: steps.gate.outputs.run == 'true'
        with:
          python-version: "3.12"
      - name: Install requests
        if: steps.gate.outputs.run == 'true'
        run: pip install requests
      - name: Download binaries
        if: steps.gate.outputs.run == 'true'
        run: |
          mkdir dl && cd dl
          gh release download "$TAG" --repo "$GITHUB_REPOSITORY" --pattern 'cyber-controller-*' --clobber
          rm -f *.sha256
      - name: Scan + post VirusTotal results
        if: steps.gate.outputs.run == 'true'
        run: python scripts/vt_release_scan.py "$TAG" dl
