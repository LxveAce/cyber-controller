name: Build & Release

on:
  release:
    types: [published]

permissions:
  contents: write

# Build via build.py (the single source of truth) on every platform so the release binaries
# bundle EVERYTHING the app needs at runtime — the QSS theme, assets, all UI submodules, and
# the firmware profiles. The previous hand-rolled per-job pyinstaller command bundled only
# src/config/profiles and never the QSS, so the shipped GUI crashed silently at launch
# (apply_theme() read a stylesheet that was not in the bundle). build.py keeps CI and local
# builds identical. `submodules: recursive` ensures the deadmans-switch submodule is present.

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller
          pip install .
      - name: Build executable
        run: python build.py
      - name: Rename binary
        shell: cmd
        run: |
          move dist\CyberController.exe dist\cyber-controller-${{ github.event.release.tag_name }}-windows-x64.exe
      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          files: dist/cyber-controller-${{ github.event.release.tag_name }}-windows-x64.exe

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y libegl1 libxkbcommon0
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller
          pip install .
      - name: Build executable
        run: python build.py
      - name: Rename binary
        run: |
          mv dist/CyberController dist/cyber-controller-${{ github.event.release.tag_name }}-linux-x64
          chmod +x dist/cyber-controller-${{ github.event.release.tag_name }}-linux-x64
      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          files: dist/cyber-controller-${{ github.event.release.tag_name }}-linux-x64

  build-linux-arm:
    runs-on: ubuntu-latest
    # ARM/QEMU build is best-effort (slow, PyQt5 ARM wheel dependent) — never fail the release on it.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64
      - name: Build with QEMU
        run: |
          docker run --rm --platform linux/arm64 \
            -v ${{ github.workspace }}:/workspace \
            -w /workspace \
            python:3.12-slim bash -c "
              apt-get update && apt-get install -y binutils libegl1 libxkbcommon0 && \
              pip install pyinstaller && \
              pip install . && \
              python build.py && \
              mv dist/CyberController dist/cyber-controller-${{ github.event.release.tag_name }}-linux-arm64 && \
              chmod +x dist/cyber-controller-${{ github.event.release.tag_name }}-linux-arm64
            "
      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          files: dist/cyber-controller-${{ github.event.release.tag_name }}-linux-arm64

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller
          pip install .
      - name: Build executable
        run: python build.py
      - name: Rename binary
        run: |
          mv dist/CyberController dist/cyber-controller-${{ github.event.release.tag_name }}-macos-arm64
          chmod +x dist/cyber-controller-${{ github.event.release.tag_name }}-macos-arm64
      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          files: dist/cyber-controller-${{ github.event.release.tag_name }}-macos-arm64
